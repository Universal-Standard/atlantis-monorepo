name: Automated Issue Resolution

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to resolve'
        required: true
        type: string
  issues:
    types: [opened, labeled]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write
  checks: write

jobs:
  analyze-and-resolve:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || 
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'auto-detected'))
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get Issue Details
        id: issue-details
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.inputs?.issue_number || context.payload.issue?.number;
            
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNumber)
            });
            
            core.setOutput('issue_number', issueNumber);
            core.setOutput('issue_title', issue.data.title);
            core.setOutput('issue_body', issue.data.body);
            
            // Add to project board (update status)
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNumber),
              labels: ['in-progress']
            });
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: parseInt(issueNumber),
              body: '🤖 **Automated Resolution Started**\n\nThis issue is now being automatically analyzed and resolved by our AI-powered system.'
            });

      - name: Create Solution Branch
        id: create-branch
        run: |
          ISSUE_NUMBER="${{ steps.issue-details.outputs.issue_number }}"
          BRANCH_NAME="auto-fix/issue-${ISSUE_NUMBER}"
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git checkout -b "$BRANCH_NAME"
          git push origin "$BRANCH_NAME"
          
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT

      - name: Analyze Issue and Generate Solution
        id: generate-solution
        uses: actions/github-script@v8
        env:
          ISSUE_TITLE: ${{ steps.issue-details.outputs.issue_title }}
          ISSUE_BODY: ${{ steps.issue-details.outputs.issue_body }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueTitle = process.env.ISSUE_TITLE || '';
            const issueBody = process.env.ISSUE_BODY || '';
            
            // Generate solution based on issue type (case-insensitive regex matching)
            let solution = '';
            let files = [];
            const titleLower = issueTitle.toLowerCase();
            
            // Use consistent regex patterns for matching
            if (titleLower.match(/contribut(ing|ion|e)/)) {
              solution = 'Create CONTRIBUTING.md with contribution guidelines';
              files.push({
                path: 'CONTRIBUTING.md',
                content: `# Contributing to ATLANTIS Monorepo\n\n## Welcome Contributors!\n\nThank you for your interest in contributing to the ATLANTIS AI project.\n\n## Getting Started\n\n1. Fork the repository\n2. Clone your fork locally\n3. Create a feature branch\n4. Make your changes\n5. Test your changes\n6. Submit a pull request\n\n## Code Standards\n\n- Follow existing code style and conventions\n- Write clear commit messages\n- Add tests for new features\n- Update documentation as needed\n\n## Pull Request Process\n\n1. Ensure all tests pass\n2. Update the README.md with details of changes if needed\n3. The PR will be reviewed by maintainers\n4. Once approved, it will be merged\n\n## Automated Workflows\n\nThis repository uses automated workflows for issue detection, resolution, and merging.\n\n## Code of Conduct\n\nPlease be respectful and professional in all interactions.\n`
              });
            }
            
            if (titleLower.match(/licen[cs]e/)) {
              solution = 'Create LICENSE file with MIT license';
              files.push({
                path: 'LICENSE',
                content: `MIT License\n\nCopyright (c) 2026 Universal Standard - ATLANTIS AI\n\nPermission is hereby granted, free of charge, to any person obtaining a copy\nof this software and associated documentation files (the "Software"), to deal\nin the Software without restriction, including without limitation the rights\nto use, copy, modify, merge, publish, distribute, sublicense, and/or sell\ncopies of the Software, and to permit persons to whom the Software is\nfurnished to do so, subject to the following conditions:\n\nThe above copyright notice and this permission notice shall be included in all\ncopies or substantial portions of the Software.\n\nTHE SOFTWARE IS PROVIDED "AS IS", WITHOUT WARRANTY OF ANY KIND, EXPRESS OR\nIMPLIED, INCLUDING BUT NOT LIMITED TO THE WARRANTIES OF MERCHANTABILITY,\nFITNESS FOR A PARTICULAR PURPOSE AND NONINFRINGEMENT. IN NO EVENT SHALL THE\nAUTHORS OR COPYRIGHT HOLDERS BE LIABLE FOR ANY CLAIM, DAMAGES OR OTHER\nLIABILITY, WHETHER IN AN ACTION OF CONTRACT, TORT OR OTHERWISE, ARISING FROM,\nOUT OF OR IN CONNECTION WITH THE SOFTWARE OR THE USE OR OTHER DEALINGS IN THE\nSOFTWARE.\n`
              });
            }
            
            if (titleLower.match(/\.?gitignore/)) {
              solution = 'Create .gitignore file with common patterns';
              files.push({
                path: '.gitignore',
                content: `# Dependencies\nnode_modules/\nvendor/\n*.egg-info/\n__pycache__/\n*.pyc\n\n# Build outputs\ndist/\nbuild/\n*.o\n*.so\n*.exe\n\n# IDE\n.vscode/\n.idea/\n*.swp\n*.swo\n*~\n\n# OS\n.DS_Store\nThumbs.db\n\n# Logs\n*.log\nlogs/\n\n# Environment\n.env\n.env.local\n*.key\n*.pem\n\n# Test coverage\ncoverage/\n*.coverage\n.nyc_output/\n\n# Temporary\ntmp/\ntemp/\n*.tmp\n`
              });
            }
            
            if (titleLower.match(/security/)) {
              solution = 'Create SECURITY.md with security policy';
              files.push({
                path: 'SECURITY.md',
                content: `# Security Policy\n\n## Supported Versions\n\nThe following versions of the ATLANTIS monorepo are currently supported with security updates:\n\n| Version | Supported          |\n| ------- | ------------------ |\n| main    | :white_check_mark: |\n\n## Reporting a Vulnerability\n\nWe take security vulnerabilities seriously. If you discover a security issue in this repository, please follow these steps:\n\n### Private Disclosure\n\n**Do not** report security vulnerabilities through public GitHub issues. Instead, please use the following method:\n\n1. **GitHub Security Advisories**: Use the [Report a Vulnerability](../../security/advisories/new) button on the Security tab of this repository to submit a private security report.\n\n### What to Include\n\nWhen reporting a vulnerability, please provide as much of the following information as possible:\n\n- A description of the vulnerability and its potential impact\n- The affected component(s) or workflow(s)\n- Steps to reproduce the issue\n- Any potential mitigations you have identified\n- Your contact information for follow-up questions\n\n### Response Timeline\n\n- **Acknowledgement**: We will acknowledge receipt of your report within **48 hours**.\n- **Assessment**: We will assess the severity and impact within **7 days**.\n- **Resolution**: We aim to resolve confirmed vulnerabilities within **30 days**, depending on complexity.\n- **Disclosure**: We will coordinate public disclosure with you once a fix is available.\n\n## Security Practices\n\n### Automated Security Scanning\n\nThis repository uses several automated security measures:\n\n- **CodeQL Analysis**: Automated code scanning to detect common vulnerabilities.\n- **Dependabot**: Automated dependency updates to address known vulnerabilities in dependencies.\n- **Secret Detection**: Automated scanning to prevent accidental exposure of credentials or secrets in commits.\n\n### Workflow Security\n\nAll GitHub Actions workflows in this repository follow security best practices:\n\n- Workflow permissions are explicitly scoped at the workflow level rather than relying on default token permissions.\n- Third-party actions are pinned to specific version tags.\n- Secrets are managed through GitHub Encrypted Secrets and never hardcoded.\n\n## Security Updates\n\nSecurity patches and updates will be applied to the \`main\` branch. Users are encouraged to keep their forks and deployments up to date with the latest changes from \`main\`.\n\n## Responsible Disclosure\n\nWe are committed to working with security researchers in good faith. We ask that you:\n\n- Give us reasonable time to address the issue before any public disclosure.\n- Avoid accessing, modifying, or deleting data that does not belong to you.\n- Act in good faith and avoid disrupting the availability of our systems.\n\nWe appreciate the efforts of the security community and will acknowledge contributors who responsibly disclose vulnerabilities (with their permission).\n`
              });
            }
            
            core.setOutput('solution', solution);
            core.setOutput('files', JSON.stringify(files));
            
            return { solution, files };

      - name: Apply Solution
        run: |
          BRANCH_NAME="${{ steps.create-branch.outputs.branch_name }}"
          git checkout "$BRANCH_NAME"
          
          # Parse and create files
          FILES='${{ steps.generate-solution.outputs.files }}'
          
          # Check if FILES is empty or contains empty array
          if [ -z "$FILES" ] || [ "$FILES" = "[]" ]; then
            echo "No files to create - FILES is empty or contains empty array"
            exit 0
          fi
          
          # Use process substitution instead of pipe to avoid subshell
          # Validate FILES JSON
          if [ -z "$FILES" ]; then
            echo "❌ No files JSON provided in generate-solution output (FILES is empty)." >&2
            exit 1
          fi
          
          if ! echo "$FILES" | jq -e . >/dev/null 2>&1; then
            echo "❌ Invalid JSON in FILES variable. Aborting file creation." >&2
            exit 1
          fi
          
          FILE_COUNT=$(echo "$FILES" | jq 'length')
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "⚠️ FILES JSON is valid but contains no entries. Nothing to create." >&2
            exit 1
          fi
          
          echo "Creating $FILE_COUNT file(s)..."
          
          # Iterate over files with proper error handling
          while IFS= read -r file; do
            FILE_PATH=$(echo "$file" | jq -r '.path')
            FILE_CONTENT=$(echo "$file" | jq -r '.content')
            
            if [ -z "$FILE_PATH" ] || [ "$FILE_PATH" = "null" ]; then
              echo "❌ Encountered file entry with missing or null path. Aborting." >&2
              exit 1
            fi
            
            # Create parent directory if needed
            mkdir -p "$(dirname "$FILE_PATH")"
            
            # Create/write file and handle errors
            if ! echo "$FILE_CONTENT" > "$FILE_PATH"; then
              echo "❌ Failed to create or write file: $FILE_PATH" >&2
              exit 1
            fi
            
            git add "$FILE_PATH"
            echo "✓ Created file: $FILE_PATH"
          done < <(echo "$FILES" | jq -c '.[]')
          
          # Commit changes
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🤖 Auto-fix: ${{ steps.generate-solution.outputs.solution }}"
            
            git push origin "$BRANCH_NAME"
          fi

      - name: Create Pull Request
        id: create-pr
        uses: actions/github-script@v8
        env:
          SOLUTION: ${{ steps.generate-solution.outputs.solution }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = ${{ steps.issue-details.outputs.issue_number }};
            const branchName = '${{ steps.create-branch.outputs.branch_name }}';
            const solution = process.env.SOLUTION || '';
            
            // Check if PR already exists
            const existingPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branchName}`,
              state: 'open'
            });
            
            if (existingPRs.data.length > 0) {
              console.log('PR already exists');
              core.setOutput('pr_number', existingPRs.data[0].number);
              return existingPRs.data[0].number;
            }
            
            const pr = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🤖 Auto-fix: ${solution}`,
              head: branchName,
              base: 'main',
              body: `## Automated Fix\n\nThis PR was automatically generated to resolve issue #${issueNumber}.\n\n**Solution:** ${solution}\n\n### Changes Made\n- Automated analysis of the issue\n- Generated appropriate solution\n- Applied fix with best practices\n- Ready for automated review and merge\n\n### Automated Workflow\n✅ Issue detected and analyzed\n✅ Solution generated\n✅ Changes applied\n⏳ Awaiting automated review\n⏳ Pending automated merge\n\nFixes #${issueNumber}`,
              maintainer_can_modify: true
            });
            
            // Add labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.data.number,
              labels: ['automated-fix']
            });
            
            core.setOutput('pr_number', pr.data.number);
            return pr.data.number;

      - name: Update Issue Status
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = ${{ steps.issue-details.outputs.issue_number }};
            const prNumber = ${{ steps.create-pr.outputs.pr_number }};
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `✅ **Solution Generated**\n\nA pull request has been automatically created: #${prNumber}\n\nThe fix will be automatically reviewed and merged once all checks pass.`
            });
            
            // Update labels
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              labels: ['solution-generated']
            });

      - name: Trigger Auto Review
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = ${{ steps.create-pr.outputs.pr_number }};
            
            // Trigger the auto-review workflow
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-review-and-merge.yml',
              ref: 'main',
              inputs: {
                pr_number: prNumber.toString()
              }
            });
